name: Release (multi-platform)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag/branch/SHA) to build from. Empty = current ref.'
        required: false
        default: ''
      tag:
        description: 'Release tag to publish to (e.g. v3.1.1)'
        required: true
        default: 'v3.1.1'

permissions:
  contents: write

jobs:
  windows-build:
    name: Windows build, sign, and package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "Unspecified Error DOCX Recovery.sln"
        continue-on-error: true

      - name: Build (Release / Any CPU)
        run: msbuild "Unspecified Error DOCX Recovery.sln" /p:Configuration=Release /p:Platform="Any CPU" /m
        continue-on-error: true

      - name: Stage Windows bundle (prefer fresh build, fall back to prebuilt)
        shell: bash
        run: |
          set -euo pipefail
          stage="dist-stage/windows"
          mkdir -p "$stage"
          cp -r "Unspecified Error DOCX Recovery/bin/Release/." "$stage/"
          cat > "$stage/INSTALL.txt" <<'EOF'
          Quick Word Recovr — Windows bundle
          ===================================
          Run "Savvy DOCX Recovery.exe" directly. No installer required.

          The bundle includes the helper utilities (xmllint, 7z, zip, trunc,
          coffec, trid, no-frills) and dependent DLLs that the original app
          shells out to during recovery.

          For an installer build, see setupVII-without-adware-offers.iss in
          the source repository (Inno Setup).
          EOF

      - name: Sign Windows binaries (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder: dist-stage/windows
          files-folder-filter: exe,msi,dll
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Zip signed Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path dist-stage/windows/* -DestinationPath dist/quickwordrecovr-windows.zip -Force

      - name: Upload signed Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows-signed-bundle
          path: dist/quickwordrecovr-windows.zip
          if-no-files-found: error

  bundles:
    name: Package non-Windows platform bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Build platform bundles
        run: |
          set -euo pipefail
          mkdir -p dist
          for plat in macos linux chromeos android ios web; do
            stage="dist-stage/${plat}"
            mkdir -p "$stage"
            cp -r web/. "$stage/"
            cat > "$stage/INSTALL.txt" <<EOF
          Quick Word Recovr — ${plat} bundle
          ===================================

          This bundle is a Progressive Web App. It is a single static folder; no
          build step or server is required for local use.

          QUICK START
          -----------
          1. Open index.html in any modern browser, OR
          2. Serve the folder with a static HTTP server, OR
          3. Use the hosted version:
             https://socrtwo.github.io/quickwordrecovr-SF/

          INSTALL AS AN APP
          -----------------
          - Windows / macOS / Linux / ChromeOS: open the live URL, then click
            the install icon in the browser address bar (Chrome, Edge, Brave).
          - Android: open the live URL in Chrome, then Menu -> Add to Home screen.
          - iOS / iPadOS: open the live URL in Safari, then Share -> Add to
            Home Screen.

          OFFLINE
          -------
          Once installed (or once the live URL has been opened once with a
          service-worker capable browser), the app works fully offline.
          EOF
            (cd "$stage" && zip -qr "../../dist/quickwordrecovr-${plat}.zip" .)
          done
          ls -la dist/

      - name: Upload non-Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: nonwindows-bundles
          path: dist/quickwordrecovr-*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [windows-build, bundles]
    runs-on: ubuntu-latest
    steps:
      - name: Download signed Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-signed-bundle
          path: release

      - name: Download non-Windows bundles
        uses: actions/download-artifact@v4
        with:
          name: nonwindows-bundles
          path: release

      - name: List release files
        run: ls -la release/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create / update GitHub Release (replace existing assets)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          generate_release_notes: true
          files: release/quickwordrecovr-*.zip
          fail_on_unmatched_files: true
          body: |
            ## Quick Word Recovr — ${{ steps.tag.outputs.ref }}

            Multi-platform release. Pick the bundle for your platform:

            | Platform | Asset |
            |---|---|
            | Windows | `quickwordrecovr-windows.zip` (native VB.NET build + helper utilities, signed via Azure Trusted Signing) |
            | macOS | `quickwordrecovr-macos.zip` (PWA bundle) |
            | Linux | `quickwordrecovr-linux.zip` (PWA bundle) |
            | ChromeOS | `quickwordrecovr-chromeos.zip` (PWA bundle) |
            | Android | `quickwordrecovr-android.zip` (PWA bundle) |
            | iOS / iPadOS | `quickwordrecovr-ios.zip` (PWA bundle) |
            | Web | `quickwordrecovr-web.zip` — or use the [live app](https://socrtwo.github.io/quickwordrecovr-SF/) |

            All non-Windows bundles contain the same offline-capable web app.
            Open `index.html` directly or install it via your browser (see
            `INSTALL.txt` in each archive).

      - name: Ensure latest assets are uploaded (clobber on re-run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.ref }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" release/quickwordrecovr-*.zip \
            --repo "$GITHUB_REPOSITORY" --clobber
